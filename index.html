<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>BEAM CRM</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--green:#00a859;--green2:#e9f8f0;--yellow:#ffd43b;--shadow:0 10px 28px rgba(17,24,39,.08);--r:22px}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:88px} 
    header{position:sticky;top:0;z-index:5;background:rgba(244,246,248,.9);backdrop-filter:blur(14px);padding:16px 16px 10px} h1{margin:0;font-size:25px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
    main{padding:0 14px 16px;max-width:980px;margin:auto}.top{display:flex;gap:10px;align-items:center;margin:8px 0 14px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff;font-size:16px}textarea{min-height:76px}
    button{border:0;border-radius:16px;padding:12px 14px;font-weight:800;font-size:15px;background:var(--text);color:white}.green{background:var(--green)}.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}.danger{background:#fee2e2;color:#991b1b}.small{font-size:13px;padding:8px 10px;border-radius:12px}
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin:12px 0}.hero{background:linear-gradient(135deg,#fff 0%,#e9f8f0 100%);border:1px solid #d7f1e3}.label{font-size:13px;color:var(--muted)}.big{font-size:36px;font-weight:900;letter-spacing:-1.2px;margin:7px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:13px}.kpi b{display:block;font-size:18px;margin-top:5px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:10px 0}.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:18px;padding:13px;background:#fff}.itemHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.pill{display:inline-block;background:var(--green2);color:#087a45;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.muted{color:var(--muted)}.money{font-weight:900}.tabs{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:10}.tab{background:transparent;color:var(--muted);padding:7px 2px;border-radius:14px;font-size:11px}.tab.active{background:var(--green2);color:#087a45}.hide{display:none}.title{font-size:20px;font-weight:900;margin:18px 0 8px}.hr{height:1px;background:var(--line);margin:12px 0}.right{text-align:right}.warn{background:#fff8db;border:1px solid #ffe58f}.neg{color:#dc2626}.pos{color:#059669}
    @media(min-width:720px){body{padding-bottom:0}.tabs{position:sticky;top:74px;max-width:980px;margin:0 auto 10px;border:1px solid var(--line);border-radius:20px;grid-template-columns:repeat(5,1fr);bottom:auto}.grid{grid-template-columns:repeat(4,1fr)}.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.formgrid .wide{grid-column:span 2}}
  </style>
</head>
<body>
<header><h1>BEAM CRM</h1><div class="sub">Owner Edition · месячные отчёты и отгрузки</div></header>
<main>
  <div class="top"><select id="monthSelect"></select><button class="green" id="addMonth">+ Месяц</button></div>
  <section id="home"></section><section id="shipments" class="hide"></section><section id="clients" class="hide"></section><section id="finance" class="hide"></section><section id="history" class="hide"></section>
</main>
<nav class="tabs">
  <button class="tab active" data-tab="home">🏠<br>Главная</button><button class="tab" data-tab="shipments">🚚<br>Отгрузки</button><button class="tab" data-tab="clients">👥<br>Клиенты</button><button class="tab" data-tab="finance">💰<br>Финансы</button><button class="tab" data-tab="history">📈<br>История</button>
</nav>
<script>
(function(){
var KEY='beam_crm_v4';
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function n(v){v=String(v||'').replace(',','.').replace(/\s/g,'');return Number(v)||0}
function rub(v){var s=Math.round(v).toLocaleString('ru-RU');return s+' ₽'}
function monthName(d){var a=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];return a[d.getMonth()]+' '+d.getFullYear()}
var now=new Date();
var state=load()||{activeMonth:now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'),clients:[{id:id(),name:'Новый клиент',phone:'',city:'',note:''}],months:{}};
if(!state.months[state.activeMonth]) state.months[state.activeMonth]=defaultMonth(state.activeMonth);
function defaultMonth(key){return {key:key,name:monthName(new Date(key+'-01')),settings:{vat:22,profitTax:25,divTax:13,ipTax:9,warehouse:155000,car:120000,accounting:70000,salaryGross:100000,insuranceRate:30},shipments:[]}}
function load(){try{return JSON.parse(localStorage.getItem(KEY))}catch(e){return null}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function M(){return state.months[state.activeMonth]}
function calcShipment(s){var rev=n(s.sale)*n(s.meters), buy=n(s.buy)*n(s.meters), vat=1+n(M().settings.vat)/100; var revNo=rev/vat,buyNo=buy/vat; var op=revNo-buyNo-n(s.logistics); return {rev:rev,buy:buy,revNo:revNo,buyNo:buyNo,op:op,commission:n(s.commission),bonus:n(s.bonus)}}
function calcMonth(){var m=M(), set=m.settings, op=0, rev=0, comm=0, bonus=0; m.shipments.forEach(function(s){var c=calcShipment(s);op+=c.op;rev+=c.rev;comm+=c.commission;bonus+=c.bonus}); var ip=set.warehouse+set.car+set.accounting; var insurance=set.salaryGross*set.insuranceRate/100; var fixed=ip+set.salaryGross+insurance; var ooo=op-fixed; var profitTax=ooo>0?ooo*set.profitTax/100:0; var after=ooo-profitTax; var div=after>0?after*(1-set.divTax/100):0; var ipNet=ip*(1-set.ipTax/100); var salaryNet=set.salaryGross*(1-13/100); var ownerBefore=div+ipNet+salaryNet+bonus; var owner=ownerBefore-comm; return {rev:rev,op:op,ip:ip,insurance:insurance,fixed:fixed,ooo:ooo,profitTax:profitTax,after:after,div:div,ipNet:ipNet,salaryNet:salaryNet,comm:comm,bonus:bonus,ownerBefore:ownerBefore,owner:owner,shipments:m.shipments.length,clients:uniqueClients(m.shipments).length}}
function uniqueClients(arr){var o={};arr.forEach(function(s){if(s.clientId)o[s.clientId]=1});return Object.keys(o)}
function clientName(cid){var c=state.clients.find(function(x){return x.id===cid});return c?c.name:'Без клиента'}
function renderMonthSelect(){var sel=document.getElementById('monthSelect');sel.innerHTML='';Object.keys(state.months).sort().forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=state.months[k].name; if(k===state.activeMonth)o.selected=true; sel.appendChild(o)})}
function render(){renderMonthSelect();['home','shipments','clients','finance','history'].forEach(function(t){document.getElementById(t).classList.toggle('hide',t!==activeTab)}); renderHome(); renderShipments(); renderClients(); renderFinance(); renderHistory(); save()}
var activeTab='home';
document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){activeTab=b.dataset.tab;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});b.classList.add('active');render()}});
document.getElementById('monthSelect').onchange=function(){state.activeMonth=this.value;render()};
document.getElementById('addMonth').onclick=function(){var key=prompt('Введите месяц в формате ГГГГ-ММ',state.activeMonth); if(!key)return; if(!state.months[key])state.months[key]=defaultMonth(key); state.activeMonth=key; render()};
function renderHome(){var c=calcMonth();document.getElementById('home').innerHTML='<div class="card hero"><div class="label">Тебе чистыми в этом месяце</div><div class="big '+(c.owner<0?'neg':'')+'">'+rub(c.owner)+'</div><div class="muted">После налогов, ИП, зарплаты, бонусов и комиссии менеджера</div></div><div class="grid"><div class="kpi"><span class="label">Оборот с НДС</span><b>'+rub(c.rev)+'</b></div><div class="kpi"><span class="label">Опер. прибыль</span><b>'+rub(c.op)+'</b></div><div class="kpi"><span class="label">Прибыль ООО</span><b>'+rub(c.ooo)+'</b></div><div class="kpi"><span class="label">Отгрузки</span><b>'+c.shipments+'</b></div></div><div class="card"><div class="title">Быстрые действия</div><button class="green" onclick="window.addShipment()">+ Добавить отгрузку</button> <button class="ghost" onclick="window.addClient()">+ Клиент</button></div>'}
function clientOptions(selected){return '<option value="">Без клиента</option>'+state.clients.map(function(c){return '<option value="'+c.id+'" '+(selected===c.id?'selected':'')+'>'+esc(c.name)+'</option>'}).join('')}
function renderShipments(){var html='<div class="title">Отгрузки месяца</div><div class="card"><button class="green" onclick="window.addShipment()">+ Добавить отгрузку</button></div><div class="list">';M().shipments.forEach(function(s,i){var c=calcShipment(s);html+='<div class="item"><div class="itemHead"><div><b>Отгрузка №'+(i+1)+'</b><div class="muted">'+clientName(s.clientId)+' · '+(s.date||'без даты')+'</div></div><span class="pill">'+rub(c.op)+'</span></div><div class="formgrid"><label>Дата<input data-f="date" data-id="'+s.id+'" value="'+esc(s.date||'')+'" type="date"></label><label>Клиент<select data-f="clientId" data-id="'+s.id+'">'+clientOptions(s.clientId)+'</select></label><label>Реализация ₽/м.п.<input data-f="sale" data-id="'+s.id+'" value="'+s.sale+'"></label><label>Закуп ₽/м.п.<input data-f="buy" data-id="'+s.id+'" value="'+s.buy+'"></label><label>Метраж<input data-f="meters" data-id="'+s.id+'" value="'+s.meters+'"></label><label>Логистика<input data-f="logistics" data-id="'+s.id+'" value="'+s.logistics+'"></label><label>Комиссия менеджера<input data-f="commission" data-id="'+s.id+'" value="'+s.commission+'"></label><label>Наличный бонус<input data-f="bonus" data-id="'+s.id+'" value="'+s.bonus+'"></label></div><div class="hr"></div><div class="grid"><div>Оборот: <b>'+rub(c.rev)+'</b></div><div>Прибыль отгрузки: <b>'+rub(c.op)+'</b></div><div>Комиссия: <b>'+rub(c.commission)+'</b></div><div>Бонус: <b>'+rub(c.bonus)+'</b></div></div><p><button class="danger small" onclick="window.delShipment(\''+s.id+'\')">Удалить</button></p></div>'});html+='</div>';document.getElementById('shipments').innerHTML=html;bindInputs(M().shipments)}
function renderClients(){var html='<div class="title">Клиенты</div><div class="card"><button class="green" onclick="window.addClient()">+ Добавить клиента</button></div><div class="list">';state.clients.forEach(function(cl){var arr=M().shipments.filter(function(s){return s.clientId===cl.id});var rev=0,op=0;arr.forEach(function(s){var c=calcShipment(s);rev+=c.rev;op+=c.op});html+='<div class="item"><div class="itemHead"><div><b>'+esc(cl.name)+'</b><div class="muted">'+esc(cl.city||'')+' '+esc(cl.phone||'')+'</div></div><span class="pill">'+arr.length+' отгр.</span></div><div class="row"><label>Название<input data-c="name" data-id="'+cl.id+'" value="'+esc(cl.name)+'"></label><label>Телефон<input data-c="phone" data-id="'+cl.id+'" value="'+esc(cl.phone||'')+'"></label></div><div class="row"><label>Город<input data-c="city" data-id="'+cl.id+'" value="'+esc(cl.city||'')+'"></label><label>Комментарий<input data-c="note" data-id="'+cl.id+'" value="'+esc(cl.note||'')+'"></label></div><div class="grid"><div>Оборот: <b>'+rub(rev)+'</b></div><div>Опер. прибыль: <b>'+rub(op)+'</b></div></div><p><button class="danger small" onclick="window.delClient(\''+cl.id+'\')">Удалить</button></p></div>'});html+='</div>';document.getElementById('clients').innerHTML=html;document.querySelectorAll('[data-c]').forEach(function(inp){inp.oninput=function(){var cl=state.clients.find(function(x){return x.id===inp.dataset.id});cl[inp.dataset.c]=inp.value;save();renderMonthSelect()}})}
function renderFinance(){var c=calcMonth(), s=M().settings;document.getElementById('finance').innerHTML='<div class="title">Финансы месяца</div><div class="card"><div class="formgrid">'+field('НДС %','vat',s.vat)+field('Налог ООО %','profitTax',s.profitTax)+field('НДФЛ дивиденды %','divTax',s.divTax)+field('Налог ИП %','ipTax',s.ipTax)+field('Склад','warehouse',s.warehouse)+field('Машина','car',s.car)+field('Бухгалтерия','accounting',s.accounting)+field('ЗП грязными','salaryGross',s.salaryGross)+field('Страховые %','insuranceRate',s.insuranceRate)+'</div></div><div class="card"><div class="grid"><div>Опер. прибыль<br><b>'+rub(c.op)+'</b></div><div>Расходы ООО<br><b>'+rub(c.fixed)+'</b></div><div>Прибыль ООО<br><b>'+rub(c.ooo)+'</b></div><div>Налог ООО<br><b>'+rub(c.profitTax)+'</b></div><div>Дивиденды<br><b>'+rub(c.div)+'</b></div><div>ИП на руки<br><b>'+rub(c.ipNet)+'</b></div><div>ЗП на руки<br><b>'+rub(c.salaryNet)+'</b></div><div>Комиссия<br><b>'+rub(c.comm)+'</b></div><div>Бонус наличный<br><b>'+rub(c.bonus)+'</b></div><div>Тебе чистыми<br><b>'+rub(c.owner)+'</b></div></div></div>';document.querySelectorAll('[data-set]').forEach(function(inp){inp.oninput=function(){M().settings[inp.dataset.set]=n(inp.value);render()}})}
function field(label,k,v){return '<label>'+label+'<input data-set="'+k+'" value="'+v+'"></label>'}
function renderHistory(){var html='<div class="title">История месяцев</div><div class="list">';Object.keys(state.months).sort().forEach(function(k){var old=state.activeMonth;state.activeMonth=k;var c=calcMonth();state.activeMonth=old;html+='<div class="item"><div class="itemHead"><div><b>'+state.months[k].name+'</b><div class="muted">'+c.shipments+' отгрузок · '+c.clients+' клиентов</div></div><div class="right"><div class="money">'+rub(c.owner)+'</div><div class="muted">оборот '+rub(c.rev)+'</div></div></div></div>'});html+='</div>';document.getElementById('history').innerHTML=html}
function bindInputs(arr){document.querySelectorAll('[data-f]').forEach(function(inp){inp.oninput=function(){var s=arr.find(function(x){return x.id===inp.dataset.id});s[inp.dataset.f]=inp.value;save(); renderShipments(); renderHome();}})}
window.addShipment=function(){var cl=state.clients[0]?state.clients[0].id:'';M().shipments.push({id:id(),date:new Date().toISOString().slice(0,10),clientId:cl,sale:420,buy:385,meters:4200,logistics:53000,commission:0,bonus:0});activeTab='shipments';document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x.dataset.tab==='shipments')});render()}
window.delShipment=function(sid){M().shipments=M().shipments.filter(function(s){return s.id!==sid});render()}
window.addClient=function(){var name=prompt('Название клиента'); if(!name)return; state.clients.push({id:id(),name:name,phone:'',city:'',note:''});activeTab='clients';document.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('active',x.dataset.tab==='clients')});render()}
window.delClient=function(cid){if(!confirm('Удалить клиента? В отгрузках он станет без клиента.'))return; state.clients=state.clients.filter(function(c){return c.id!==cid});Object.keys(state.months).forEach(function(k){state.months[k].shipments.forEach(function(s){if(s.clientId===cid)s.clientId=''})});render()}
function esc(s){return String(s||'').replace(/[&<>"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]})}
render();
})();
</script>
</body>
</html>
